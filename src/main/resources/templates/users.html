<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
</head>
<body>

<h1>Users List</h1>

<a href="/web/users/create">Create User</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>age</th>
        <th>actions</th>
    </tr>

    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.age}"></td>
        <td>
            <a th:href="@{/web/users/edit/{id}(id=${user.id})}">Edit</a>
            <a th:href="@{/web/users/delete/{id}(id=${user.id})}">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>

</body>
</html>
