    <meta charset="UTF-8">

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User</title>
</head>
<body>

<h1>Edit User</h1>

<form th:action="@{/web/users/update/{id}(id=${user.id})}"
      th:object="${user}"
      method="post">

    <!-- ID (скрытое поле, можно не показывать) -->
    <input type="hidden" th:field="*{id}" />

    <div>
        <label>Name:</label>
        <input type="text" th:field="*{name}" />
    </div>

    <div>
        <label>Age:</label>
        <input type="number" th:field="*{age}" />
    </div>

    <br/>

    <button type="submit">Update</button>

</form>

<br/>

<a href="/web/users">Back to list</a>

</body>
</html>

</body>
</html>
