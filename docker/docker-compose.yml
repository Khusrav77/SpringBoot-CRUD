version: '3.8'

volumes:
  pg_crud_jpa:

services:
  pg_db:
    image: postgres:15
    restart: always
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crud_db
    volumes:
      - pg_crud_jpa:/var/lib/postgresql/data
    ports:
      - "5435:5432"

